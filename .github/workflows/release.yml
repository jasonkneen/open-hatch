name: Release Desktop App

# Build and publish desktop installers whenever a version tag is pushed.
# Push a tag like `v0.1.2` to trigger a release:
#
#     git tag v0.1.2
#     git push origin v0.1.2
#
# The workflow can also be kicked off manually from the Actions tab.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate app icon from SVG
        run: npm run icon

      - name: Build web bundle
        run: npm run build

      - name: Build Electron installers
        # Publish to a GitHub release only when the workflow was triggered by
        # a version tag. Manual `workflow_dispatch` runs build the same
        # installers but leave them as workflow artifacts only, so you can
        # smoke-test the pipeline on a branch without creating a release.
        run: npx --no-install electron-builder --publish ${{ startsWith(github.ref, 'refs/tags/') && 'always' || 'never' }}
        env:
          # GH_TOKEN is required by electron-builder to upload assets to the
          # release that matches the pushed tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip code signing on macOS and Windows when no certificates are
          # configured. Override these by adding signing secrets later.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: open-hatch-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.yml
            release/*.blockmap
          if-no-files-found: ignore
