<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Hatch — AI Workspace</title>

    <link rel="icon" type="image/svg+xml" href="/icon-192.svg" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />

    <meta name="theme-color" content="#0c0c0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hatch" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Hatch" />
    <meta name="description" content="AI-powered workspace for documents, chat, and memory" />

    <meta property="og:title" content="Hatch — AI Workspace" />
    <meta property="og:description" content="AI-powered workspace for documents, chat, and memory" />
    <meta property="og:image" content="https://bolt.new/static/og_default.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png" />
  </head>
  <body>
    <script>
      (function(){
        var t=localStorage.getItem('hatch_theme')||'dark';
        if(t==='system')t=window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';
        document.documentElement.setAttribute('data-theme',t);
        document.documentElement.style.background=t==='dark'?'#0c0c0c':'#f8f8f8';
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
